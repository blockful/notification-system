query ListOffchainVotes(
  $fromDate: Int
  $toDate: Int
  $limit: Int
  $skip: Int
  $orderBy: queryInput_votesOffchain_orderBy
  $orderDirection: OrderDirection
  $voterAddresses: [String]
) {
  votesOffchain(
    fromDate: $fromDate
    toDate: $toDate
    limit: $limit
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    voterAddresses: $voterAddresses
  ) {
    items {
      voter
      created
      proposalId
      proposalTitle
      reason
      vp
    }
    totalCount
  }
}
