query GetProposalById($id: String!) {
  proposalsOnchain(id: $id) {
    id
    daoId
    proposerAccountId
    targets
    values
    signatures
    calldatas
    startBlock
    endBlock
    description
    timestamp
    status
    forVotes
    againstVotes
    abstainVotes
  }
}

query ListProposals($where: proposalsOnchainFilter, $limit: Int, $orderBy: String, $orderDirection: String) {
  proposalsOnchains(where: $where, limit: $limit, orderBy: $orderBy, orderDirection: $orderDirection) {
    items {
      id
      daoId
      proposerAccountId
      targets
      values
      signatures
      calldatas
      startBlock
      endBlock
      description
      timestamp
      status
      forVotes
      againstVotes
      abstainVotes
    }
  }
}