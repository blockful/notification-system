query GetProposalById($id: String!) {
  proposal(id: $id) {
    id
    daoId
    proposerAccountId
    title
    description
    startBlock
    endBlock
    endTimestamp
    timestamp
    status
    forVotes
    againstVotes
    abstainVotes
    txHash
  }
}

query ListProposals($skip: NonNegativeInt, $limit: PositiveInt, $orderDirection: queryInput_proposals_orderDirection, $status: JSON, $fromDate: Float, $fromEndDate: Float, $includeOptimisticProposals: Boolean) {
  proposals(skip: $skip, limit: $limit, orderDirection: $orderDirection, status: $status, fromDate: $fromDate, fromEndDate: $fromEndDate, includeOptimisticProposals: $includeOptimisticProposals) {
    items {
      id
      daoId
      proposerAccountId
      title
      description
      startBlock
      endBlock
      endTimestamp
      timestamp
      status
      forVotes
      againstVotes
      abstainVotes
      txHash
    }
    totalCount
  }
}