query OffchainProposalNonVoters($id: String!, $addresses: [String], $orderDirection: OrderDirection) {
  offchainProposalNonVoters(id: $id, addresses: $addresses, orderDirection: $orderDirection) {
    ... on OffchainVotersResponse {
      items {
        voter
        votingPower
      }
    }
  }
}
