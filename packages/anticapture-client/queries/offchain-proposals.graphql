query ListOffchainProposals($skip: Int, $limit: Int, $orderDirection: OrderDirection, $status: [queryInput_offchainProposals_status_items], $fromDate: Int, $endDate: Int) {
  offchainProposals(skip: $skip, limit: $limit, orderDirection: $orderDirection, status: $status, fromDate: $fromDate, endDate: $endDate) {
    items {
      id
      title
      discussion
      link
      state
      created
      end
    }
    totalCount
  }
}
