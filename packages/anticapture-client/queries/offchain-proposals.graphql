query ListOffchainProposals($skip: NonNegativeInt, $limit: PositiveInt, $orderDirection: queryInput_offchainProposals_orderDirection, $status: JSON, $fromDate: Float, $endDate: Float) {
  offchainProposals(skip: $skip, limit: $limit, orderDirection: $orderDirection, status: $status, fromDate: $fromDate, endDate: $endDate) {
    items {
      id
      title
      discussion
      link
      state
      created
      end
    }
    totalCount
  }
}
