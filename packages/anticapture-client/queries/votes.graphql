query ListVotes(
  $voterAddressIn: [String]
  $fromDate: Int
  $toDate: Int
  $limit: Int
  $skip: Int
  $orderBy: queryInput_votes_orderBy
  $orderDirection: OrderDirection
  $support: String
) {
  votes(
    voterAddressIn: $voterAddressIn
    fromDate: $fromDate
    toDate: $toDate
    limit: $limit
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    support: $support
  ) {
    items {
      transactionHash
      proposalId
      voterAddress
      support
      votingPower
      timestamp
      reason
      proposalTitle
    }
    totalCount
  }
}
