query ListVotes(
  $voterAddressIn: JSON
  $fromDate: Float
  $toDate: Float
  $limit: Float
  $skip: NonNegativeInt
  $orderBy: queryInput_votes_orderBy
  $orderDirection: queryInput_votes_orderDirection
  $support: Float
) {
  votes(
    voterAddressIn: $voterAddressIn
    fromDate: $fromDate
    toDate: $toDate
    limit: $limit
    skip: $skip
    orderBy: $orderBy
    orderDirection: $orderDirection
    support: $support
  ) {
    items {
      transactionHash
      proposalId
      voterAddress
      support
      votingPower
      timestamp
      reason
      proposalTitle
    }
    totalCount
  }
}