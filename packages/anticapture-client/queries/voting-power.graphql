query ListHistoricalVotingPower(
  $limit: Int
  $skip: Int
  $orderBy: queryInput_historicalVotingPower_orderBy
  $orderDirection: OrderDirection
  $fromDate: Int
  $address: String
) {
  historicalVotingPower(limit: $limit, skip: $skip, orderBy: $orderBy, orderDirection: $orderDirection, fromDate: $fromDate, address: $address) {
    items {
      accountId
      timestamp
      votingPower
      delta
      daoId
      transactionHash
      logIndex
      delegation {
        from
        to
        value
        previousDelegate
      }
      transfer {
        from
        to
        value
      }
    }
    totalCount
  }
}
