query ListHistoricalVotingPower($limit: PositiveInt, $skip: NonNegativeInt, $orderBy: queryInput_historicalVotingPower_orderBy, $orderDirection: queryInput_historicalVotingPower_orderDirection, $fromDate: String, $address: String) {
  historicalVotingPower(limit: $limit, skip: $skip, orderBy: $orderBy, orderDirection: $orderDirection, fromDate: $fromDate, address: $address) {
    items {
      accountId
      timestamp
      votingPower
      delta
      daoId
      transactionHash
      delegation {
        from
        to
        value
        previousDelegate
      }
      transfer {
        from
        to
        value
      }
    }
    totalCount
  }
}