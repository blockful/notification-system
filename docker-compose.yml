version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notification_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Subscription Server (base service, others depend on it)
  subscription-server:
    build:
      context: .
      dockerfile: apps/subscription-server/Dockerfile
    container_name: subscription-server
    ports:
      - "3001:3003"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_system
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped

  # Consumers (Telegram Bot + API)
  consumers:
    build:
      context: .
      dockerfile: apps/consumers/Dockerfile
    container_name: consumers
    ports:
      - "3000:3000"
    environment:
      IS_PRODUCTION: false
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your_telegram_bot_token_here}
      ANTICAPTURE_DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_system
      SUBSCRIPTION_SERVER_URL: http://subscription-server:3003
      API_PORT: 3000
    depends_on:
      - postgres
      - subscription-server
    networks:
      - notification-network
    restart: unless-stopped

  # Dispatcher
  dispatcher:
    build:
      context: .
      dockerfile: apps/dispatcher/Dockerfile
    container_name: dispatcher
    ports:
      - "3002:3002"
    environment:
      IS_PRODUCTION: false
      PORT: 3002
      SUBSCRIPTION_SERVER_URL: http://subscription-server:3003
      TELEGRAM_CONSUMER_URL: http://consumers:3000
    depends_on:
      - subscription-server
      - consumers
    networks:
      - notification-network
    restart: unless-stopped

  # Logic System (worker, no ports exposed)
  logic-system:
    build:
      context: .
      dockerfile: apps/logic-system/Dockerfile
    container_name: logic-system
    environment:
      IS_PRODUCTION: false
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_system
      DISPATCHER_ENDPOINT: http://dispatcher:3002
      TRIGGER_INTERVAL: 60000
      PROPOSAL_STATUS: active
    depends_on:
      - postgres
      - dispatcher
    networks:
      - notification-network
    restart: unless-stopped

networks:
  notification-network:
    driver: bridge

volumes:
  postgres_data: 