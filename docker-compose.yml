services:
  subscription-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - notification-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - notification-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  # Subscription Server (base service, others depend on it)
  subscription-server:
    build:
      context: .
      dockerfile: apps/subscription-server/Dockerfile
    container_name: subscription-server
    ports:
      - "3001:3003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@subscription-db:5432/postgres
      PORT: 3003
    networks:
      - notification-network
    restart: unless-stopped
    depends_on:
      - subscription-db

  # Consumers (Telegram Bot + RabbitMQ Consumer)
  consumers:
    build:
      context: .
      dockerfile: apps/consumers/Dockerfile
    container_name: consumers
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ANTICAPTURE_GRAPHQL_ENDPOINT: ${ANTICAPTURE_GRAPHQL_ENDPOINT}
      SUBSCRIPTION_SERVER_URL: http://subscription-server:3003
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      subscription-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped

  # Dispatcher
  dispatcher:
    build:
      context: .
      dockerfile: apps/dispatcher/Dockerfile
    container_name: dispatcher
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      SUBSCRIPTION_SERVER_URL: http://subscription-server:3003
    depends_on:
      subscription-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped

  # Logic System (worker, no ports exposed)
  logic-system:
    build:
      context: .
      dockerfile: apps/logic-system/Dockerfile
    container_name: logic-system
    environment:
      ANTICAPTURE_GRAPHQL_ENDPOINT: ${ANTICAPTURE_GRAPHQL_ENDPOINT}
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      TRIGGER_INTERVAL: 2000
      PROPOSAL_STATUS: pending
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped

networks:
  notification-network:
    driver: bridge
